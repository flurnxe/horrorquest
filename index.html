<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HorrorQuest | Страшные квесты</title>
    <style>
        /* минимальные стили для демонстрации */
        body { background: #0a0a0a; color: #e0e0e0; font-family: sans-serif; }
        .slot { background: #1e3a2a; padding: 10px; margin: 5px; display: inline-block; cursor: pointer; border-radius: 8px; }
        .booked { background: #3a3a3a; cursor: not-allowed; opacity: 0.6; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #121212; padding: 20px; border-radius: 16px; width: 300px; }
        .close-modal { float: right; cursor: pointer; }
    </style>
</head>
<body>

<div id="main">
    <h1>Квесты</h1>
    <div id="questsGrid"></div>
</div>

<div id="questPage" style="display:none;">
    <button id="backToMain">← Назад</button>
    <h2 id="questTitle"></h2>
    <div id="slotsContainer"></div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Бронирование</h3>
        <p id="modalSlotInfo"></p>
        <form id="bookingForm">
            <input type="hidden" id="bookingQuestApiId">
            <input type="hidden" id="bookingDate">
            <input type="hidden" id="bookingTime">
            <input type="text" id="clientName" placeholder="Имя" required><br><br>
            <input type="tel" id="clientPhone" placeholder="Телефон" required><br><br>
            <input type="email" id="clientEmail" placeholder="Email" required><br><br>
            <select id="playersCount">
                <option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option>
            </select><br><br>
            <button type="submit">ЗАБРОНИРОВАТЬ</button>
        </form>
        <div id="bookingMessage"></div>
    </div>
</div>

<script>
    // КВЕСТЫ
    const quests = [
        { id: "q1", title: "Психбольница 2.0", apiId: "60bf9e6aa70341229aac724b" },
        { id: "q2", title: "Сущность", apiId: "612371c2c48e46702e1efbea" },
        { id: "q3", title: "Месть хирурга", apiId: "57b7d426f0904d5430951d0c" }
    ];

    // API (прямые ссылки, работали на GitHub)
    const API_BASE = "https://xn--b1acdcqi5ci.xn--p1ai/api/booking/quest/";
    const API_BOOKING = "https://xn--b1acdcqi5ci.xn--p1ai/api/booking_reserveds/quest";

    async function fetchSlots(apiId) {
        const res = await fetch(API_BASE + apiId);
        return await res.json();
    }

    async function sendBooking(data) {
        const res = await fetch(API_BOOKING, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
        return await res.json();
    }

    function showQuestPage(quest) {
        document.getElementById("main").style.display = "none";
        document.getElementById("questPage").style.display = "block";
        document.getElementById("questTitle").innerText = quest.title;

        // Даты на 7 дней
        const dates = [];
        for (let i = 0; i < 7; i++) {
            let d = new Date();
            d.setDate(d.getDate() + i);
            dates.push(d.toISOString().slice(0,10));
        }

        let selectedDate = dates[0];
        let slotsData = [];

        function renderSlots() {
            const filtered = slotsData.filter(s => s.date === selectedDate);
            const container = document.getElementById("slotsContainer");
            if (!filtered.length) {
                container.innerHTML = "<p>Нет слотов</p>";
                return;
            }
            container.innerHTML = filtered.map(s => `
                <div class="slot ${!s.is_free ? 'booked' : ''}" data-time="${s.time}">
                    ${s.time} ${s.price || 4000}₽
                </div>
            `).join("");
            document.querySelectorAll('.slot:not(.booked)').forEach(el => {
                el.onclick = () => {
                    document.getElementById("bookingQuestApiId").value = quest.apiId;
                    document.getElementById("bookingDate").value = selectedDate;
                    document.getElementById("bookingTime").value = el.dataset.time;
                    document.getElementById("modalSlotInfo").innerHTML = `${quest.title}<br>${selectedDate} ${el.dataset.time}`;
                    document.getElementById("bookingModal").style.display = "flex";
                };
            });
        }

        async function loadSlots() {
            slotsData = await fetchSlots(quest.apiId);
            renderSlots();
        }

        // Кнопки дат
        const dateDiv = document.createElement("div");
        dateDiv.id = "dateButtons";
        document.getElementById("questPage").insertBefore(dateDiv, document.getElementById("slotsContainer"));
        function renderDates() {
            dateDiv.innerHTML = dates.map(d => `<button class="date-btn ${d === selectedDate ? 'active' : ''}" data-date="${d}">${d}</button>`).join("");
            document.querySelectorAll('.date-btn').forEach(btn => {
                btn.onclick = () => {
                    selectedDate = btn.dataset.date;
                    renderDates();
                    renderSlots();
                };
            });
        }

        renderDates();
        loadSlots();
    }

    function showMain() {
        document.getElementById("main").style.display = "block";
        document.getElementById("questPage").style.display = "none";
        document.getElementById("questsGrid").innerHTML = quests.map(q => `
            <div class="quest-card" data-id="${q.id}">
                <h3>${q.title}</h3>
            </div>
        `).join("");
        document.querySelectorAll('.quest-card').forEach(card => {
            card.onclick = () => showQuestPage(quests.find(q => q.id === card.dataset.id));
        });
    }

    document.getElementById("bookingForm").onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            quest_id: document.getElementById("bookingQuestApiId").value,
            date: document.getElementById("bookingDate").value,
            time: document.getElementById("bookingTime").value,
            name: document.getElementById("clientName").value,
            phone: document.getElementById("clientPhone").value,
            email: document.getElementById("clientEmail").value,
            persons: parseInt(document.getElementById("playersCount").value)
        };
        const btn = e.target.querySelector("button");
        btn.disabled = true;
        btn.innerText = "Отправка...";
        try {
            const result = await sendBooking(data);
            document.getElementById("bookingMessage").innerHTML = "<span style='color:green'>✅ Бронь создана!</span>";
            setTimeout(() => {
                document.getElementById("bookingModal").style.display = "none";
                showMain();
            }, 1500);
        } catch (err) {
            document.getElementById("bookingMessage").innerHTML = "<span style='color:red'>❌ Ошибка</span>";
            btn.disabled = false;
            btn.innerText = "ЗАБРОНИРОВАТЬ";
        }
    };

    document.querySelectorAll(".close-modal").forEach(el => el.onclick = () => document.getElementById("bookingModal").style.display = "none");
    document.getElementById("backToMain").onclick = showMain;

    showMain();
</script>
</body>
</html>
